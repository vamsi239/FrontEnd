<!DOCTYPE html>
<html>
<head>
    <title>Three Containers</title>
    <style>
        .container {
            width: 300px;
            padding: 20px;
            margin: 15px;
            border: 2px solid black;
            display: inline-block;
            text-align: center;
        }

        #box1 {
            background-color: lightblue;
        }

        #box2 {
            background-color: lightgreen;
        }

        #box3 {
            background-color: lightcoral;
        }
    </style>
</head>
<body>

    <h2>Three Containers</h2>
    <a href="blockinline.html">BlockLine code</a>

    <div id="box1" class="container">
        <h3>Container 1</h3>
        <p>This is the first container.</p>
    </div>

    <div id="box2" class="container">
        <h3>Container 2</h3>
        <p>This is the second container.</p>
    </div>

    <div id="box3" class="container">
        <h3>Container 3</h3>
        <p>This is the third container.</p>
    </div>

</body>
</html>
