<div class="min-h-screen flex items-center justify-center bg-gray-100">

  <form [formGroup]="form" (ngSubmit)="handelForm()"
        class="bg-white p-6 rounded w-96 shadow space-y-4">

    <h2 class="text-green-600 text-xl font-semibold text-center">
      Registration Form
    </h2>

    <!-- First Name -->
    <div>
      <label>First Name:</label>
      <input type="text" class="w-full border p-2"
             formControlName="firstName">
    </div>

    <!-- Last Name -->
    <div>
      <label>Last Name:</label>
      <input type="text" class="w-full border p-2"
             formControlName="lastName">
    </div>

    <!-- Email -->
    <div>
      <label>Email:</label>
      <input type="email" class="w-full border p-2"
             formControlName="email">
    </div>

    <!-- Password -->
    <div>
      <label>Password:</label>
      <input type="password" class="w-full border p-2"
             formControlName="password">
    </div>

    <!-- Confirm Password -->
    <div>
      <label>Re-type Password:</label>
      <input type="password" class="w-full border p-2"
             formControlName="confirmPassword">
    </div>

    <!-- Contact -->
    <div>
      <label>Contact:</label>
      <input type="text" class="w-full border p-2"
             formControlName="contact">
    </div>

    <!-- Gender -->
    <div>
      <label>Gender:</label>
      <select class="w-full border p-2" formControlName="gender">
        <option value="male">Male</option>
        <option value="female">Female</option>
      </select>
    </div>

    <!-- Submit -->
    <button type="submit"
      class="w-full bg-green-500 text-white p-2 rounded"
      [disabled]="form.invalid">
      Submit
    </button>

  </form>
</div>
