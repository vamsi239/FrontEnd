<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Example</title>
    <style>
        table, td {
            border: 1px solid black;
            /* border-collapse: collapse; */
            /* padding: 10px; */
            text-align: center;
        }
    </style>
</head>
<body>

    <table>
        <tr>
            <td>Column1</td>
            <td>Column2</td>
            <td>Column3</td>
        </tr>

        <tr>
            <td rowspan="2">Row1 Cell1</td>
            <td>Row1 Cell2</td>
            <td>Row1 Cell3</td>
        </tr>

        <tr>
            <td>Row2 Cell2</td>
            <td>Row2 Cell3</td>
        </tr>

        <tr>
            <td colspan="3">Row3 Cell1</td>
        </tr>
    </table>

</body>
</html>
