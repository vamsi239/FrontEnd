<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Order Summary</title>
  <link rel="stylesheet" href="task11.css">
</head>
<body>

<div class="card">
  <img src="https://i.imgur.com/2DhmtJ4.png" class="hero">

  <div class="content">
    <h2>Order Summary</h2>
    <p>
      You can now listen to millions of songs, audiobooks, and podcasts
      on any device anywhere you like!
    </p>

    <div class="plan">
      <div class="plan-left">
        <span class="icon">🎵</span>
        <div>
          <h4>Annual Plan</h4>
          <p>$59.99/year</p>
        </div>
      </div>
      <a href="#">Change</a>
    </div>

    <button class="payment">Proceed to Payment</button>
    <p class="cancel">Cancel Order</p>
  </div>
</div>

</body>
</html>
